<h2 class="text-xl font-bold mb-4">
    Tambah Mahasiswa
</h2>
<form method="POST" action="/mahasiswa/store">
    <input name="nama" placeholder="Nama" class="border p-2 w-full mb-3">
    <input name="jurusan" placeholder="Jurusan" class="border p-2 w-full mb-3">
    <input name="angkatan" placeholder="Angkatan" class="border p-2 w-full mb-3">
    <button class="bg-blue-500 text-white px-4 py-2">
        Simpan
    </button>
</form>
